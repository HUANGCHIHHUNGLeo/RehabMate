<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<link rel="icon" href="data:," />
<title>疼痛定位系統 · PainMap 3D</title>
<style>
  :root{
    --accent:#2f6bff; --accent-soft:#e6eefc; --ink:#f4f6f8;
    --pain:#e23744; --relief:#1fae67; --panel:rgba(255,255,255,.86);
    --text:#243040; --muted:#7c8aa0; --line:#e3e8ef;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;background:var(--ink);color:var(--text);
    font-family:"Inter","PingFang TC","Noto Sans TC",system-ui,sans-serif}
  #app{position:fixed;inset:0}
  canvas{display:block;touch-action:none}
  /* backdrop */
  #bg{position:fixed;inset:0;z-index:-1;
    background:
      radial-gradient(1100px 760px at 50% 30%, #ffffff, transparent 60%),
      linear-gradient(180deg,#f7f9fb 0%,#eef1f5 100%);}
  .hud{position:fixed;z-index:10;pointer-events:none}
  .hud *{pointer-events:auto}

  /* top-left title */
  #brand{top:22px;left:24px}
  #brand h1{font-size:17px;font-weight:700;letter-spacing:.5px;display:flex;align-items:center;gap:9px;color:var(--text)}
  #brand h1 .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);
    box-shadow:0 0 10px rgba(47,107,255,.5);animation:pulse 2s infinite}
  #brand p{margin-top:5px;font-size:11.5px;color:var(--muted);letter-spacing:2px}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

  /* left panel（桌面靠左上，位於品牌標題下方） */
  #panel{top:84px;left:20px;width:264px;max-height:calc(100vh - 104px);overflow-y:auto;background:var(--panel);
    border:1px solid var(--line);border-radius:14px;padding:16px 16px 14px;
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    box-shadow:0 10px 34px rgba(40,60,90,.12)}
  #panel h2{font-size:12px;letter-spacing:2px;color:var(--accent);font-weight:700;
    display:flex;align-items:center;gap:8px;margin-bottom:12px;cursor:pointer}
  #panel h2 span.count{color:var(--muted);font-weight:500;margin-left:auto}
  #collapseBtn{color:var(--muted);font-size:13px;transition:transform .2s;width:16px;text-align:center}
  #panel.collapsed h2{margin-bottom:0}
  #panel.collapsed #collapseBtn{transform:rotate(-90deg)}
  #panel.collapsed #panelBody{display:none}
  #modes{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:11px}
  #modes button{padding:8px;border-radius:8px;border:1px solid var(--line);background:#fff;
    color:var(--text);font-size:12px;cursor:pointer;letter-spacing:1px;transition:.15s}
  #modes button:hover,#modes button.on{border-color:var(--accent);color:var(--accent);background:#eef3ff}
  #modes button.on{font-weight:600}
  #list{display:flex;flex-direction:column;gap:7px;max-height:44vh;overflow-y:auto}
  #list::-webkit-scrollbar{width:5px}#list::-webkit-scrollbar-thumb{background:#cfd8e3;border-radius:3px}
  .row{display:flex;align-items:center;gap:10px;font-size:13px;padding:8px 10px;cursor:pointer;
    border-radius:9px;background:#f7f9fc;border:1px solid var(--line);transition:.15s}
  .row:hover,.row.selected{border-color:var(--accent);background:#eef3ff}
  .row .swatch{width:11px;height:11px;border-radius:50%;flex:0 0 auto}
  .row .nm{flex:1;color:var(--text)}
  .row .side{font-size:10.5px;color:var(--muted)}
  .row.zone.selected{border-color:var(--accent);background:#eef3ff}
  .legend{margin-top:13px;display:flex;gap:14px;font-size:11px;color:var(--muted)}
  .legend i{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;vertical-align:-1px}
  #empty{font-size:12px;color:var(--muted);line-height:1.7;padding:6px 2px}
  #editor{display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--line)}
  #editor.visible{display:block}
  #editor h3{font-size:12px;margin-bottom:9px;color:var(--text)}
  #painTypes{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
  #painTypes button{padding:8px 2px;border-radius:8px;border:1px solid var(--line);background:#fff;
    color:var(--text);font-size:11.5px;cursor:pointer;
    transition:border-color .15s,color .15s,background .15s,transform 120ms cubic-bezier(0.23,1,0.32,1)}
  #painTypes button:hover,#painTypes button.on{border-color:var(--accent);color:var(--accent);background:#eef3ff}
  #painTypes button:active{transform:scale(0.96)}
  #scoreLabel{margin:11px 0 6px;font-size:10.5px;color:var(--muted);letter-spacing:1px}
  #scoreRow{display:grid;grid-template-columns:repeat(11,1fr);gap:3px}
  #scoreRow button{padding:6px 0;border-radius:6px;border:1px solid var(--line);background:#fff;
    color:var(--text);font-size:11px;cursor:pointer;text-align:center;
    transition:border-color .15s,color .15s,background .15s,transform 120ms cubic-bezier(0.23,1,0.32,1)}
  #scoreRow button:hover,#scoreRow button.on{border-color:var(--accent);color:var(--accent);background:#eef3ff}
  #scoreRow button.on{font-weight:700}
  #scoreRow button:active{transform:scale(0.94)}
  #deletePin{margin-top:9px;width:100%;padding:8px;border-radius:8px;cursor:pointer;
    background:#fff;border:1px solid rgba(226,55,68,.35);color:#c62c38;font-size:12px}
  #limitMessage{display:none;margin-top:9px;color:#c62c38;font-size:11px}
  #clear{margin-top:12px;width:100%;padding:9px;border-radius:9px;cursor:pointer;
    background:#fdecec;border:1px solid rgba(226,55,68,.3);color:#c62c38;
    font-size:12px;letter-spacing:1px;font-weight:600;transition:.15s}
  #clear:hover{background:#fbdddd}

  /* bottom hint */
  #hint{bottom:20px;left:50%;transform:translateX(-50%);font-size:12px;color:var(--muted);
    letter-spacing:2px;text-align:center;background:rgba(255,255,255,.8);padding:8px 18px;border-radius:20px;
    border:1px solid var(--line);box-shadow:0 4px 14px rgba(40,60,90,.08)}
  #hint b{color:var(--accent);font-weight:600}
  /* view buttons（面板搬左後移到右下，避免相撞） */
  #views{bottom:20px;right:24px;display:flex;gap:8px}
  #views button{pointer-events:auto;background:rgba(255,255,255,.9);border:1px solid var(--line);
    color:var(--text);font-size:12px;padding:8px 14px;border-radius:9px;cursor:pointer;letter-spacing:1px;
    backdrop-filter:blur(10px);transition:.15s;box-shadow:0 4px 14px rgba(40,60,90,.06)}
  #views button:hover,#views button.on{border-color:var(--accent);color:var(--accent);box-shadow:0 0 0 2px rgba(47,107,255,.12)}
  #tooltip{position:fixed;z-index:20;pointer-events:none;background:#ffffff;
    border:1px solid var(--accent);color:var(--text);font-size:12.5px;padding:5px 10px;border-radius:7px;
    letter-spacing:.5px;opacity:0;transform:translate(-50%,-140%);transition:opacity .12s;white-space:nowrap;
    box-shadow:0 6px 18px rgba(40,60,90,.18)}
  /* ---- jarvis focus HUD (transform/opacity only) ---- */
  :root{--holo:#2596dc;--holo-ink:#1173b8}
  #jarvis{position:fixed;left:0;top:0;z-index:15;pointer-events:none;opacity:0;
    transition:opacity 220ms cubic-bezier(0.23,1,0.32,1);will-change:transform}
  #jarvis.show{opacity:1}
  #jarvis .ring{position:absolute;left:0;top:0;border-radius:50%}
  #jarvis .r1{width:118px;height:118px;border:1px solid rgba(37,150,220,.85);
    border-top-color:transparent;border-bottom-color:transparent;
    animation:spinCW 7s linear infinite}
  #jarvis .r2{width:92px;height:92px;border:1px dashed rgba(37,150,220,.5);
    animation:spinCCW 11s linear infinite}
  #jarvis .r3{width:64px;height:64px;border:1px solid rgba(37,150,220,.3);
    transform:translate(-50%,-50%)}
  #jarvis .dotc{position:absolute;left:0;top:0;width:5px;height:5px;border-radius:50%;
    background:var(--holo);transform:translate(-50%,-50%);box-shadow:0 0 8px rgba(78,201,255,.9)}
  @keyframes spinCW{from{transform:translate(-50%,-50%) rotate(0)}to{transform:translate(-50%,-50%) rotate(360deg)}}
  @keyframes spinCCW{from{transform:translate(-50%,-50%) rotate(0)}to{transform:translate(-50%,-50%) rotate(-360deg)}}
  #jarvis .lead{position:absolute;left:44px;top:-44px;width:52px;height:1px;
    background:linear-gradient(90deg,rgba(37,150,220,.9),rgba(37,150,220,.35));
    transform:rotate(-38deg);transform-origin:left center}
  #jarvis .tag{position:absolute;left:86px;top:-104px;white-space:nowrap;
    font-family:"SF Mono",ui-monospace,Menlo,monospace;text-align:left;
    border-bottom:1px solid rgba(37,150,220,.55);padding-bottom:4px}
  #jarvis .tag #jarvisName{font-size:13.5px;font-weight:700;color:var(--holo-ink);letter-spacing:1px}
  #jarvis .tag .sub{margin-top:2px;font-size:8.5px;letter-spacing:2.5px;color:rgba(17,115,184,.6)}
  #backWrap{left:50%;bottom:64px;transform:translateX(-50%)}
  #backFull{opacity:0;transform:translateY(8px);pointer-events:none;
    transition:opacity 200ms cubic-bezier(0.23,1,0.32,1),transform 200ms cubic-bezier(0.23,1,0.32,1);
    background:rgba(255,255,255,.92);border:1px solid rgba(37,150,220,.55);color:var(--holo-ink);
    font-size:12px;letter-spacing:2px;padding:9px 20px;border-radius:20px;cursor:pointer;
    font-family:"SF Mono",ui-monospace,Menlo,monospace;
    backdrop-filter:blur(10px);box-shadow:0 4px 14px rgba(40,60,90,.1)}
  #backFull.show{opacity:1;transform:translateY(0);pointer-events:auto}
  #backFull.show:active{transform:translateY(0) scale(0.97)}
  @media (prefers-reduced-motion: reduce){
    #jarvis .r1,#jarvis .r2{animation:none;transform:translate(-50%,-50%)}
  }
  @media (max-width:640px){
    /* 返回全身鈕浮在底部抽屜上方；抽屜收合時貼近底部 */
    #backWrap{bottom:calc(38vh + 22px)}
    #panel.collapsed ~ #backWrap{bottom:88px}
    #panel{width:calc(100vw - 24px);left:12px;right:12px;top:auto;bottom:12px;
      max-height:38vh;background:rgba(255,255,255,.92);padding:12px 13px 10px}
    #panel h2{margin-bottom:8px}
    #list{max-height:18vh}
    .row{padding:7px 9px}
    #views{bottom:auto;top:64px;left:12px;right:auto;gap:6px}
    #views button{padding:7px 11px;font-size:11.5px}
    #hint{display:none}
    #brand{left:14px;top:14px}
    #brand h1{font-size:15px}
    .legend{margin-top:9px}
  }
</style>
</head>
<body>
<div id="bg"></div>
<div id="app"></div>

<div class="hud" id="brand">
  <h1><span class="dot"></span>疼痛定位系統</h1>
  <p>PAINMAP · 3D BODY</p>
</div>

<div class="hud" id="panel">
  <h2 id="panelHead">疼痛標記 <span class="count" id="count">0</span><span id="collapseBtn" aria-label="收合">▾</span></h2>
  <div id="panelBody">
  <div id="modes">
    <button id="modeZone" class="on">區塊標記</button>
    <button id="modePin">大頭針標記</button>
  </div>
  <div id="list"><div id="empty">點選身體任一部位標記疼痛。<br>再點一下 = 已緩解，第三下 = 清除。</div></div>
  <div id="editor">
    <h3 id="editorTitle">目前選取</h3>
    <div id="painTypes"></div>
    <div id="scoreLabel">疼痛程度 NRS 0-10（再點一次取消）</div>
    <div id="scoreRow"></div>
    <button id="deletePin">刪除此大頭針</button>
  </div>
  <div id="limitMessage">最多只能放置 20 根大頭針。</div>
  <button id="clear">清除全部</button>
  <div class="legend" id="zoneLegend">
    <span><i style="background:#e23744"></i>疼痛</span>
    <span><i style="background:#1fae67"></i>已緩解</span>
  </div>
  </div>
</div>

<div class="hud" id="views">
  <button data-v="front" class="on">正面</button>
  <button data-v="back">背面</button>
  <button data-v="left">左側</button>
  <button data-v="right">右側</button>
</div>

<div class="hud" id="hint">拖曳 <b>旋轉</b> · 滾輪 <b>縮放</b> · 點擊身體 <b>插入大頭針</b></div>
<div id="tooltip"></div>

<div id="jarvis">
  <div class="ring r1"></div><div class="ring r2"></div><div class="ring r3"></div>
  <div class="dotc"></div>
  <div class="lead"></div>
  <div class="tag"><div id="jarvisName"></div><div class="sub">FOCUS LOCK · PAINMAP</div></div>
</div>
<div class="hud" id="backWrap"><button id="backFull">返回全身</button></div>

<script type="importmap">
{ "imports":{
  "three":"https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
  "three/addons/":"https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
}}
</script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
<script type="module" src="app.js"></script>
</body>
</html>
