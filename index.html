<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>疼痛定位系統 · PainMap 3D</title>
<style>
  :root{
    --accent:#2f6bff; --accent-soft:#e6eefc; --ink:#f4f6f8;
    --pain:#e23744; --relief:#1fae67; --panel:rgba(255,255,255,.86);
    --text:#243040; --muted:#7c8aa0; --line:#e3e8ef;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;background:var(--ink);color:var(--text);
    font-family:"Inter","PingFang TC","Noto Sans TC",system-ui,sans-serif}
  #app{position:fixed;inset:0}
  canvas{display:block;touch-action:none}
  /* backdrop */
  #bg{position:fixed;inset:0;z-index:-1;
    background:
      radial-gradient(1100px 760px at 50% 30%, #ffffff, transparent 60%),
      linear-gradient(180deg,#f7f9fb 0%,#eef1f5 100%);}
  .hud{position:fixed;z-index:10;pointer-events:none}
  .hud *{pointer-events:auto}

  /* top-left title */
  #brand{top:22px;left:24px}
  #brand h1{font-size:17px;font-weight:700;letter-spacing:.5px;display:flex;align-items:center;gap:9px;color:var(--text)}
  #brand h1 .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);
    box-shadow:0 0 10px rgba(47,107,255,.5);animation:pulse 2s infinite}
  #brand p{margin-top:5px;font-size:11.5px;color:var(--muted);letter-spacing:2px}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

  /* right panel */
  #panel{top:22px;right:20px;width:264px;background:var(--panel);
    border:1px solid var(--line);border-radius:14px;padding:16px 16px 14px;
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    box-shadow:0 10px 34px rgba(40,60,90,.12)}
  #panel h2{font-size:12px;letter-spacing:2px;color:var(--accent);font-weight:700;
    display:flex;align-items:center;gap:8px;margin-bottom:12px;cursor:pointer}
  #panel h2 span.count{color:var(--muted);font-weight:500;margin-left:auto}
  #collapseBtn{color:var(--muted);font-size:13px;transition:transform .2s;width:16px;text-align:center}
  #panel.collapsed h2{margin-bottom:0}
  #panel.collapsed #collapseBtn{transform:rotate(-90deg)}
  #panel.collapsed #panelBody{display:none}
  #list{display:flex;flex-direction:column;gap:7px;max-height:44vh;overflow-y:auto}
  #list::-webkit-scrollbar{width:5px}#list::-webkit-scrollbar-thumb{background:#cfd8e3;border-radius:3px}
  .row{display:flex;align-items:center;gap:10px;font-size:13px;padding:8px 10px;
    border-radius:9px;background:#f7f9fc;border:1px solid var(--line)}
  .row .swatch{width:11px;height:11px;border-radius:50%;flex:0 0 auto}
  .row .nm{flex:1;color:var(--text)}
  .row .side{font-size:10.5px;color:var(--muted)}
  #empty{font-size:12px;color:var(--muted);line-height:1.7;padding:6px 2px}
  #clear{margin-top:12px;width:100%;padding:9px;border-radius:9px;cursor:pointer;
    background:#fdecec;border:1px solid rgba(226,55,68,.3);color:#c62c38;
    font-size:12px;letter-spacing:1px;font-weight:600;transition:.15s}
  #clear:hover{background:#fbdddd}
  .legend{margin-top:13px;display:flex;gap:14px;font-size:11px;color:var(--muted)}
  .legend i{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;vertical-align:-1px}

  /* bottom hint */
  #hint{bottom:20px;left:50%;transform:translateX(-50%);font-size:12px;color:var(--muted);
    letter-spacing:2px;text-align:center;background:rgba(255,255,255,.8);padding:8px 18px;border-radius:20px;
    border:1px solid var(--line);box-shadow:0 4px 14px rgba(40,60,90,.08)}
  #hint b{color:var(--accent);font-weight:600}
  /* view buttons */
  #views{bottom:20px;left:24px;display:flex;gap:8px}
  #views button{pointer-events:auto;background:rgba(255,255,255,.9);border:1px solid var(--line);
    color:var(--text);font-size:12px;padding:8px 14px;border-radius:9px;cursor:pointer;letter-spacing:1px;
    backdrop-filter:blur(10px);transition:.15s;box-shadow:0 4px 14px rgba(40,60,90,.06)}
  #views button:hover,#views button.on{border-color:var(--accent);color:var(--accent);box-shadow:0 0 0 2px rgba(47,107,255,.12)}
  #tooltip{position:fixed;z-index:20;pointer-events:none;background:#ffffff;
    border:1px solid var(--accent);color:var(--text);font-size:12.5px;padding:5px 10px;border-radius:7px;
    letter-spacing:.5px;opacity:0;transform:translate(-50%,-140%);transition:opacity .12s;white-space:nowrap;
    box-shadow:0 6px 18px rgba(40,60,90,.18)}
  @media (max-width:640px){
    #panel{width:calc(100vw - 24px);left:12px;right:12px;top:auto;bottom:12px;
      max-height:30vh;background:rgba(255,255,255,.92);padding:12px 13px 10px}
    #panel h2{margin-bottom:8px}
    #list{max-height:18vh}
    .row{padding:7px 9px}
    #views{bottom:auto;top:64px;left:12px;gap:6px}
    #views button{padding:7px 11px;font-size:11.5px}
    #hint{display:none}
    #brand{left:14px;top:14px}
    #brand h1{font-size:15px}
    .legend{margin-top:9px}
  }
</style>
</head>
<body>
<div id="bg"></div>
<div id="app"></div>

<div class="hud" id="brand">
  <h1><span class="dot"></span>疼痛定位系統</h1>
  <p>PAINMAP · 3D BODY</p>
</div>

<div class="hud" id="panel">
  <h2 id="panelHead">已標記部位 <span class="count" id="count">0</span><span id="collapseBtn" aria-label="收合">▾</span></h2>
  <div id="panelBody">
  <div id="list"><div id="empty">點選身體任一部位標記疼痛。<br>再點一下 = 已緩解，第三下 = 清除。</div></div>
  <button id="clear">清除全部</button>
  <div class="legend">
    <span><i style="background:#e23744"></i>疼痛</span>
    <span><i style="background:#1fae67"></i>已緩解</span>
  </div>
  </div>
</div>

<div class="hud" id="views">
  <button data-v="front" class="on">正面</button>
  <button data-v="back">背面</button>
  <button data-v="left">左側</button>
  <button data-v="right">右側</button>
</div>

<div class="hud" id="hint">拖曳 <b>旋轉</b> · 滾輪 <b>縮放</b> · 點擊部位 <b>標記疼痛</b></div>
<div id="tooltip"></div>

<script type="importmap">
{ "imports":{
  "three":"https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
  "three/addons/":"https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
// Model: "Male base muscular anatomy" by CharacterZone (CC-BY) via Sketchfab

const app = document.getElementById('app');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf4f6f8);
scene.fog = new THREE.FogExp2(0xeef1f5, 0.02);

const camera = new THREE.PerspectiveCamera(42, innerWidth/innerHeight, 0.1, 100);
camera.position.set(0, 1.15, 5.4);

const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
app.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; controls.dampingFactor = 0.08;
controls.target.set(0, 1.02, 0);
controls.minDistance = 2.6; controls.maxDistance = 8;
controls.maxPolarAngle = Math.PI*0.92; controls.minPolarAngle = Math.PI*0.08;
controls.autoRotate = false; // patient needs a still body to point at
controls.rotateSpeed = 1.1;      // snappier drag on touch
controls.enablePan = false;      // no accidental panning; one finger = rotate, two = zoom
controls.zoomSpeed = 1.2;
controls.touches = { ONE: THREE.TOUCH.ROTATE, TWO: THREE.TOUCH.DOLLY_PAN };

// ---- lighting: bright neutral studio (white theme) ----
scene.add(new THREE.HemisphereLight(0xffffff, 0xd8dee8, 1.05));
scene.add(new THREE.AmbientLight(0xffffff, 0.45));
const key = new THREE.DirectionalLight(0xffffff, 1.5); key.position.set(3,5,4); scene.add(key);
const fill = new THREE.DirectionalLight(0xeaf0ff, 0.8); fill.position.set(-5,2,3); scene.add(fill);
const rimB = new THREE.DirectionalLight(0xcdd8ea, 0.6); rimB.position.set(0,3,-5); scene.add(rimB);

// ---- ground: soft scanner ring (light) ----
const ring = new THREE.Mesh(
  new THREE.RingGeometry(0.9, 1.55, 96),
  new THREE.MeshBasicMaterial({color:0x2f6bff, transparent:true, opacity:0.07, side:THREE.DoubleSide})
);
ring.rotation.x = -Math.PI/2; ring.position.y = 0.01; scene.add(ring);
const ring2 = new THREE.Mesh(
  new THREE.RingGeometry(1.6, 1.63, 96),
  new THREE.MeshBasicMaterial({color:0x2f6bff, transparent:true, opacity:0.28, side:THREE.DoubleSide})
);
ring2.rotation.x = -Math.PI/2; ring2.position.y = 0.01; scene.add(ring2);
const grid2 = new THREE.GridHelper(9, 30, 0xc4cedd, 0xdde3ec);
grid2.position.y = 0; grid2.material.transparent = true; grid2.material.opacity = 0.6; scene.add(grid2);

// ---- muscle model: each muscle is a body region that fills on tap (paint-bucket) ----
const STATE = {NONE:0, PAIN:1, RELIEF:2};
const bodyMeshes = [];
// Anatomical zone centers (T-pose). Every body vertex is assigned to its nearest
// zone → each muscle owns a bounded patch of the mesh that fills cleanly, no overflow.
// [name, side, x, y, z, rx, ry, rz]  (rx/ry/rz weight the zone's reach per axis)
const MUSCLES = [
  // head / neck
  ['頭部','中', 0, 1.70, 0,  0.11,0.13,0.12],
  ['頸部','中', 0, 1.53, 0.02, 0.07,0.07,0.07],
  ['後頸','中', 0, 1.54,-0.06, 0.07,0.06,0.05],
  // shoulders (deltoid wraps front+back → z0)
  ['三角肌','左', 0.235,1.44, 0,  0.09,0.09,0.09],
  ['三角肌','右',-0.235,1.44, 0,  0.09,0.09,0.09],
  // chest (front)
  ['胸大肌','左', 0.085,1.35, 0.10, 0.085,0.075,0.06],
  ['胸大肌','右',-0.085,1.35, 0.10, 0.085,0.075,0.06],
  // upper back (back)
  ['斜方肌','中', 0, 1.46,-0.08, 0.13,0.08,0.05],
  ['背闊肌','左', 0.11,1.26,-0.09, 0.075,0.10,0.05],
  ['背闊肌','右',-0.11,1.26,-0.09, 0.075,0.10,0.05],
  // abs / obliques (front)
  ['上腹肌','中', 0, 1.20, 0.10, 0.075,0.07,0.05],
  ['下腹肌','中', 0, 1.06, 0.10, 0.075,0.07,0.05],
  ['腹外斜肌','左', 0.13,1.12, 0.07, 0.05,0.09,0.05],
  ['腹外斜肌','右',-0.13,1.12, 0.07, 0.05,0.09,0.05],
  // lower back (back)
  ['下背/腰','中', 0, 1.10,-0.09, 0.10,0.08,0.05],
  // arms — T-pose horizontal, biceps front / triceps back
  ['肱二頭肌','左', 0.40,1.395, 0.05, 0.09,0.06,0.055],
  ['肱二頭肌','右',-0.40,1.395, 0.05, 0.09,0.06,0.055],
  ['肱三頭肌','左', 0.40,1.375,-0.05, 0.09,0.06,0.055],
  ['肱三頭肌','右',-0.40,1.375,-0.05, 0.09,0.06,0.055],
  ['手肘','左', 0.55,1.37, 0,  0.05,0.05,0.05],
  ['手肘','右',-0.55,1.37, 0,  0.05,0.05,0.05],
  ['前臂','左', 0.67,1.355, 0,  0.075,0.05,0.05],
  ['前臂','右',-0.67,1.355, 0,  0.075,0.05,0.05],
  ['手','左', 0.80,1.345, 0,  0.055,0.05,0.045],
  ['手','右',-0.80,1.345, 0,  0.055,0.05,0.045],
  // hips / glutes
  ['臀大肌','左', 0.095,0.92,-0.08, 0.08,0.09,0.06],
  ['臀大肌','右',-0.095,0.92,-0.08, 0.08,0.09,0.06],
  ['髖/鼠蹊','中', 0, 0.90, 0.09, 0.10,0.07,0.05],
  // thighs — quads front / hamstrings back
  ['股四頭肌','左', 0.11,0.64, 0.07, 0.075,0.14,0.05],
  ['股四頭肌','右',-0.11,0.64, 0.07, 0.075,0.14,0.05],
  ['腿後肌','左', 0.11,0.64,-0.07, 0.07,0.14,0.05],
  ['腿後肌','右',-0.11,0.64,-0.07, 0.07,0.14,0.05],
  ['膝蓋','左', 0.11,0.37, 0.04, 0.06,0.06,0.06],
  ['膝蓋','右',-0.11,0.37, 0.04, 0.06,0.06,0.06],
  // lower legs — shin front / calf back
  ['脛前肌','左', 0.11,0.19, 0.06, 0.055,0.12,0.045],
  ['脛前肌','右',-0.11,0.19, 0.06, 0.055,0.12,0.045],
  ['腓腸肌','左', 0.11,0.19,-0.06, 0.06,0.12,0.045],
  ['腓腸肌','右',-0.11,0.19,-0.06, 0.06,0.12,0.045],
  ['足','左', 0.115,0.03, 0.05, 0.055,0.04,0.08],
  ['足','右',-0.115,0.03, 0.05, 0.055,0.04,0.08],
];
const muscleState = new Int8Array(MUSCLES.length);   // 0/1/2 per muscle
const muscleVerts = MUSCLES.map(()=>[]);             // vertex indices per muscle (set on load)
let bodyGeo = null, mainMesh = null, vMus = null;
const C_BASE=[0.905,0.915,0.945], C_PAIN=[0.886,0.216,0.267], C_RELIEF=[0.122,0.682,0.404];
const colorFor=(s)=> s===STATE.PAIN?C_PAIN : s===STATE.RELIEF?C_RELIEF : C_BASE;
function paintMuscle(mi){
  if(!bodyGeo) return;
  const c=bodyGeo.attributes.color, rgb=colorFor(muscleState[mi]);
  const vs=muscleVerts[mi];
  for(let k=0;k<vs.length;k++) c.setXYZ(vs[k], rgb[0],rgb[1],rgb[2]);
  c.needsUpdate=true;
}

// ---- load the real anatomy model (visible body) ----
const loader = new GLTFLoader();
loader.load('assets/body.glb', (gltf)=>{
  const model = gltf.scene;
  // largest mesh = the body; others = eyes
  let maxV=0;
  model.traverse(o=>{ if(o.isMesh){ const v=o.geometry.attributes.position.count; if(v>maxV){maxV=v; mainMesh=o;} } });
  model.traverse(o=>{
    if(o.isMesh){
      o.material = (o===mainMesh)
        ? new THREE.MeshStandardMaterial({ vertexColors:true, color:0xffffff, metalness:0.0, roughness:0.78 })
        : new THREE.MeshStandardMaterial({ color:0x2b3446, roughness:0.5 });
      o.renderOrder = 1;
    }
  });
  // center + scale to ~1.78 tall, feet at y=0, front faces +Z
  const box=new THREE.Box3().setFromObject(model); const size=new THREE.Vector3(); box.getSize(size);
  model.scale.setScalar(1.78/size.y);
  model.rotation.y = 0;
  const box2=new THREE.Box3().setFromObject(model); const c2=new THREE.Vector3(),min2=box2.min; box2.getCenter(c2);
  model.position.x-=c2.x; model.position.z-=c2.z; model.position.y-=min2.y;
  scene.add(model); model.updateMatrixWorld(true);
  model.traverse(o=>{ if(o.isMesh) bodyMeshes.push(o); });

  // assign each body vertex to its nearest muscle zone → per-muscle fillable regions
  bodyGeo = mainMesh.geometry;
  const pos=bodyGeo.attributes.position, n=pos.count, wm=mainMesh.matrixWorld;
  const cols=new Float32Array(n*3); vMus=new Int16Array(n);
  const tv=new THREE.Vector3();
  for(let i=0;i<n;i++){
    tv.fromBufferAttribute(pos,i).applyMatrix4(wm);
    let best=0,bestD=Infinity;
    for(let mi=0;mi<MUSCLES.length;mi++){
      const M=MUSCLES[mi], dx=(tv.x-M[2])/M[5], dy=(tv.y-M[3])/M[6], dz=(tv.z-M[4])/M[7];
      const d=dx*dx+dy*dy+dz*dz; if(d<bestD){bestD=d;best=mi;}
    }
    vMus[i]=best; muscleVerts[best].push(i);
    cols[i*3]=C_BASE[0]; cols[i*3+1]=C_BASE[1]; cols[i*3+2]=C_BASE[2];
  }
  bodyGeo.setAttribute('color', new THREE.BufferAttribute(cols,3));
  window.__bodyModel = model; window.__ready = true;
}, undefined, (err)=>{ console.warn('model load failed', err); });

// ---- interaction ----
const ray = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let hovered = null;
const tooltip = document.getElementById('tooltip');

function setPointer(e){
  const t = e.touches ? e.touches[0] : e;
  mouse.x = (t.clientX/innerWidth)*2-1;
  mouse.y = -(t.clientY/innerHeight)*2+1;
  return t;
}
function pickMuscle(){        // raycast the body, return the muscle index at the hit point
  if(!vMus || !mainMesh) return -1;
  ray.setFromCamera(mouse, camera);
  const hit = ray.intersectObject(mainMesh, false);
  if(!hit.length) return -1;
  return vMus[hit[0].face.a];
}
addEventListener('pointermove', e=>{
  const t = setPointer(e);
  const mi = pickMuscle();
  if(mi>=0){
    document.body.style.cursor='pointer';
    const M=MUSCLES[mi];
    tooltip.textContent = M[0] + (M[1]!=='中'?`（${M[1]}）`:'');
    tooltip.style.left = t.clientX+'px'; tooltip.style.top = t.clientY+'px'; tooltip.style.opacity=1;
  } else { document.body.style.cursor='default'; tooltip.style.opacity=0; }
});

let downXY=null;
addEventListener('pointerdown', e=>{ downXY=[e.clientX,e.clientY]; });
addEventListener('pointerup', e=>{
  if(!downXY) return;
  const moved = Math.hypot(e.clientX-downXY[0], e.clientY-downXY[1]);
  const wasTouch = e.pointerType === 'touch';
  downXY=null;
  if(moved > (wasTouch?12:6)) return; // finger wobble tolerance; a real drag = rotate, not mark
  setPointer(e);
  const mi = pickMuscle();
  if(mi<0) return;
  muscleState[mi] = (muscleState[mi]+1)%3;  // none → pain → relief → none
  paintMuscle(mi);
  renderList();
});

// ---- panel list ----
const listEl = document.getElementById('list');
const countEl = document.getElementById('count');
function renderList(){
  const marked=[]; for(let mi=0;mi<MUSCLES.length;mi++) if(muscleState[mi]) marked.push(mi);
  countEl.textContent = marked.length;
  if(!marked.length){
    listEl.innerHTML = '<div id="empty">點選身體任一部位標記疼痛。<br>再點一下 = 已緩解，第三下 = 清除。</div>';
    return;
  }
  listEl.innerHTML = '';
  for(const mi of marked){
    const M=MUSCLES[mi], s=muscleState[mi], side=M[1];
    const row=document.createElement('div'); row.className='row';
    row.innerHTML = `<span class="swatch" style="background:${s===STATE.PAIN?'#e23744':'#1fae67'}"></span>
      <span class="nm">${M[0]}</span>
      <span class="side">${side!=='中'?side:''} · ${s===STATE.PAIN?'疼痛':'已緩解'}</span>`;
    listEl.appendChild(row);
  }
}
document.getElementById('clear').onclick = ()=>{
  for(let mi=0;mi<MUSCLES.length;mi++){ if(muscleState[mi]){ muscleState[mi]=STATE.NONE; paintMuscle(mi); } }
  renderList();
};

// collapsible panel — keeps the body clear of the sheet, esp. on phones
const panelEl = document.getElementById('panel');
document.getElementById('panelHead').addEventListener('click', ()=> panelEl.classList.toggle('collapsed'));
if(innerWidth <= 640) panelEl.classList.add('collapsed'); // start collapsed on mobile

// ---- view buttons ----
const viewPos = {
  front:[0,1.15,5.4], back:[0,1.15,-5.4], left:[5.4,1.15,0], right:[-5.4,1.15,0]
};
document.querySelectorAll('#views button').forEach(b=>{
  b.onclick = ()=>{
    document.querySelectorAll('#views button').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    controls.autoRotate=false;
    const p = viewPos[b.dataset.v];
    animateCam(new THREE.Vector3(p[0],p[1],p[2]));
  };
});
let camAnim=null;
function animateCam(to){ camAnim={from:camera.position.clone(), to, t:0}; }

// ---- resize ----
addEventListener('resize', ()=>{
  camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ---- loop ----
const clock = new THREE.Clock();
function tick(){
  requestAnimationFrame(tick);
  const dt = clock.getDelta();
  ring.rotation.z += dt*0.4; ring2.rotation.z -= dt*0.25;
  if(camAnim){
    camAnim.t = Math.min(1, camAnim.t + dt*1.8);
    const e = 1-Math.pow(1-camAnim.t,3);
    camera.position.lerpVectors(camAnim.from, camAnim.to, e);
    if(camAnim.t>=1) camAnim=null;
  }
  controls.update();
  renderer.render(scene, camera);
}
tick();
renderList();
</script>
</body>
</html>
